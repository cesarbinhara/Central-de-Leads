<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Corporativo | Grupo Barigui</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <div class="login-logo">
                <img src="logo-barigui.png" alt="Grupo Barigui" onerror="this.src='https://via.placeholder.com/200x60?text=GRUPO+BARIGUI'">
            </div>
            <h3>Inteligência Operacional</h3>
            <form id="login-form">
                <input type="text" id="username" placeholder="Usuário" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit">Acessar Painel</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        
        <aside class="sidebar">
            <div class="sidebar-header-corp">
                <img src="logo-barigui.png" alt="Logo Barigui" class="logo-mini" onerror="this.style.display='none'">
                <span>GRUPO BARIGUI</span>
            </div>

            <div class="dept-selector">
                <p class="dept-label">DEPARTAMENTO</p>
                <button class="dept-opt active" onclick="switchDept('leads')">
                    <i data-lucide="layers"></i> CENTRAL DE LEADS
                </button>
                <button class="dept-opt" onclick="switchDept('mkt')">
                    <i data-lucide="megaphone"></i> MARKETING
                </button>
            </div>

            <hr class="side-divider">

            <nav id="menu-nav" class="menu-nav"></nav>

            <div id="admin-section" class="admin-divider" style="display: none;">
                <button class="menu-item admin-btn" onclick="showMonitor(event)"><i data-lucide="shield-check"></i> MONITORAMENTO</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <div class="nav-left">
                    <span id="current-dept-label" class="nav-label">CENTRAL DE LEADS</span>
                    <strong id="current-view-title">CENTRAL DE LEADS</strong>
                </div>
                <div class="nav-right">
                    <div class="user-info">
                        <div class="user-pill">
                            <i data-lucide="user"></i>
                            <span id="user-display"></span>
                        </div>
                        <button onclick="location.reload()" class="btn-logout">Sair</button>
                    </div>
                </div>
            </header>

            <section id="dashboard-view" class="dashboard-container">
                <div class="iframe-wrapper">
                    <iframe id="report-frame" class="looker-frame" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>

            <section id="monitor-view" class="monitor-container" style="display: none;">
                <div class="monitor-split">
                    <div class="monitor-box">
                        <div class="box-header">PROCESSAMENTO GMAIL (REGEX)</div>
                        <div id="email-log" class="log-content">Status: Aguardando...</div>
                    </div>
                    <div class="monitor-box">
                        <div class="box-header">DISPARO LOOKER PDF</div>
                        <div id="pdf-log" class="log-content">Status: Standby...</div>
                    </div>
                </div>
            </section>

            <footer class="footer">
                <span>BI Corporativo • Grupo Barigui © 2026</span>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
